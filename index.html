<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravi Teja Chimata</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0a0f1c, #000);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 10;
}

.nav-btn {
  padding: 8px 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(10,15,30,0.5);
  color: #cbd5e1;
  cursor: pointer;
  transition: 0.3s;
}

.nav-btn:hover {
  color: white;
  border-color: #38bdf8;
  box-shadow: 0 0 10px rgba(56,189,248,0.4);
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  padding-left: 80px;
}

.hero h1 {
  font-size: 70px;
  margin: 0;
}

.hero p {
  color: #38bdf8;
  letter-spacing: 2px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.hero h1 {
  font-size: 50px;
}

/* SECTION */
.section {
  padding: 100px 20px;
  display: none;
}

#home<div id="home" class="section hero">
  <div>
    <h1>Ravi Teja Chimata</h1>
    <p>Launch Quality | Supplier Quality | Plant Quality | Change Management</p>
  </div>
</div>

<div id="data" class="section">
  <h2>Data Science Career</h2>
  <p>Coming Soon</p>

  <ul>
    <li>Python</li>
    <li>SQL</li>
    <li>Power BI</li>
    <li>Machine Learning</li>
  </ul>
</div>

<div id="contact" class="section">
  <h2>Contact</h2>
  <p>Email: ravitejachimata@gmail.com</p>
</div>

<audio autoplay loop>
  <source src="background-music.mp3" type="audio/mp3">
</audio>

<script>
function showSection(id) {
  document.querySelectorAll(".section").forEach(sec => {
    sec.style.display = "none";
  });

  const target = document.getElementById(id);
  if (target) {
    target.style.display = "block";
  }
}
</script>

</body>
</html>
